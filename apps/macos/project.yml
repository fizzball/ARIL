name: ARIL
options:
  bundleIdPrefix: com.aril
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "0.3.14"
    CURRENT_PROJECT_VERSION: "44"
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
targets:
  ARIL:
    type: application
    platform: macOS
    sources:
      - path: ARIL
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aril.app
        PRODUCT_NAME: ARIL
        INFOPLIST_KEY_CFBundleDisplayName: ARIL
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
        INFOPLIST_KEY_NSHumanReadableCopyright: Copyright © 2026 Ramon Ali
        GENERATE_INFOPLIST_FILE: YES
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_HARDENED_RUNTIME: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "0.3.14"
        CURRENT_PROJECT_VERSION: "44"
        INFOPLIST_KEY_NSAppTransportSecurity_NSAllowsLocalNetworking: YES
    entitlements:
      path: ARIL/ARIL.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
        com.apple.security.network.server: true
